id = "gatOS"
name = "gatOS"
summary = "A real, minimal Alpine Linux running in a QEMU microVM, surfaced through purrTTY terminals, with live KSA vehicle telemetry exposed as a /sim filesystem."
authors = ["meow sci"]
license = "MIT"
repository = "https://github.com/meow-sci/gatOS"
homepage = "https://meow.science.fail/gatOS/"
tags = ["linux", "telemetry", "flight-computer", "scripting"]
owners = ["alex-sherwin"]
# gatOS bundles an Alpine guest image and (on Windows) a full QEMU — its zips
# are ~100–145 MB, above the 50 MiB default artifact ceiling. Raising this is
# a registration-level decision: changes to it require admin review.
max_artifact_bytes = 209715200 # 200 MiB
# Mirror the newest N releases into the published Pages site (same-origin
# downloads for the browser app). Registration-level: admin-reviewed.
mirror_versions = 5

# Social permission filter: which mods may declare required/recommends
# references to this one (regex on mod ids, full-match, case-insensitive;
# exclusions win). ".*" = anyone.
[who_can_reference]
include = [".*"]
exclude = []
