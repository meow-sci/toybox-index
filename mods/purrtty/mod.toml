id = "purrTTY"
name = "purrTTY"
summary = "A terminal emulator for KSA with mostly VT100/xterm compatibility"
authors = ["Alex Sherwin"]
license = "MIT"
repository = "https://github.com/meow-sci/purrtty"
tags = ["terminal", "utility", "shell"]
owners = ["alex-sherwin"]
# Mirror the newest N releases into the published Pages site so the browser
# app can download them same-origin (GitHub release URLs are not CORS-
# fetchable). Registration-level: changes require admin review.
mirror_versions = 5

# Social permission filter: which mods may declare required/recommends
# references to this one (regex on mod ids, full-match, case-insensitive;
# exclusions win). ".*" = anyone.
[who_can_reference]
include = [".*"]
exclude = []
